; DrowsyGuard -- Arduino Uno R4 WiFi companion (buzzer reale via MQTT).
;
; Due environment:
;  - native:      compila ed esegue i test SUL PC (Unity), nessun hardware
;                 richiesto. Usa mock al posto di WiFi/MQTT/buzzer reali.
;                 Comando: pio test -e native
;  - uno_r4_wifi: compila per la scheda vera (WiFiS3 + ArduinoMqttClient +
;                 GPIO reale). Comando: pio run -e uno_r4_wifi -t upload

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
build_flags = -DAES256=1
lib_deps =
    arduino-libraries/ArduinoMqttClient
    bblanchon/ArduinoJson
monitor_speed = 115200

[env:native]
platform = native
build_flags = -std=gnu++14 -DAES256=1
lib_deps =
    bblanchon/ArduinoJson
lib_ldf_mode = deep+
test_framework = unity

; DrowsyGuard -- Arduino Uno R4 WiFi companion (real buzzer via MQTT).
;
; Two environments:
;  - native:      compiles and runs the tests ON THE PC (Unity), no hardware
;                 required. Uses mocks instead of real WiFi/MQTT/buzzer.
;                 Command: pio test -e native
;  - uno_r4_wifi: compiles for the real board (WiFiS3 + ArduinoMqttClient +
;                 real GPIO). Command: pio run -e uno_r4_wifi -t upload

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
build_flags = -DAES256=1
lib_deps =
    arduino-libraries/ArduinoMqttClient
    bblanchon/ArduinoJson
monitor_speed = 115200

[env:native]
platform = native
build_flags = -std=gnu++14 -DAES256=1
lib_deps =
    bblanchon/ArduinoJson
lib_ldf_mode = deep+
test_framework = unity
